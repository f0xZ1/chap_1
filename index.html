<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Pháp Luật Đại Cương</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        
        /* Màn hình cài đặt */
        .setting-group {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .setting-group label {
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .setting-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .setting-group input[type="number"] {
            margin-top: 10px;
            padding: 8px;
            width: 100px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        
        /* Màn hình thi */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        .progress { font-size: 1.1em; font-weight: bold; color: #3498db; }
        .timer { font-size: 1.1em; font-weight: bold; color: #e74c3c; }
        .question { font-size: 1.2em; font-weight: bold; color: #2c3e50; margin-bottom: 20px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            background: #f8f9fa; border: 2px solid #e9ecef; padding: 15px;
            border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 1em; color: #333;
        }
        .option:hover { background: #e2e6ea; border-color: #cbd3da; }
        .correct { background: #2ecc71 !important; border-color: #27ae60 !important; color: white !important; pointer-events: none; }
        .wrong { background: #e74c3c !important; border-color: #c0392b !important; color: white !important; pointer-events: none; }
        .disabled { pointer-events: none; opacity: 0.8; }
        
        /* Nút bấm chung */
        button {
            background: #3498db; color: white; border: none; padding: 12px 20px;
            border-radius: 5px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold;
        }
        button:hover { background: #2980b9; }
        
        #quiz-box, #finish-screen { display: none; }
        #finish-screen { text-align: center; }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h2>Cài đặt bài ôn tập</h2>
    
    <div class="setting-group">
        <label>
            <input type="checkbox" id="shuffle-cb" checked>
            Xáo trộn thứ tự câu hỏi
        </label>
    </div>

    <div class="setting-group">
        <label>
            <input type="checkbox" id="timer-cb" onchange="toggleTimeInput()">
            Bật tính năng hẹn giờ (đếm ngược)
        </label>
        <div id="time-input-container" style="display: none; margin-left: 28px;">
            <input type="number" id="time-input" min="1" value="15" placeholder="Phút"> 
            <span>phút</span>
        </div>
    </div>

    <button onclick="startQuiz()">Bắt đầu ngay</button>
</div>

<div class="container" id="quiz-box">
    <div class="header">
        <div class="progress" id="progress">Câu: 1/50</div>
        <div class="timer" id="timer">--:--</div>
    </div>
    <div class="question" id="question-text">Đang tải câu hỏi...</div>
    <div class="options" id="options-container"></div>
</div>

<div class="container" id="finish-screen">
    <h2 style="color: #2ecc71;">Đã hoàn thành bài ôn tập!</h2>
    <p id="finish-message"></p>
    <button onclick="location.reload()">Quay lại cài đặt</button>
</div>

<script>

    let totalSeconds = 0;
    let isTimerActive = false;

    // Hiển thị/ẩn ô nhập số phút
    function toggleTimeInput() {
        const timerCb = document.getElementById('timer-cb');
        const timeInputContainer = document.getElementById('time-input-container');
        timeInputContainer.style.display = timerCb.checked ? 'block' : 'none';
    }

    // Hàm xáo trộn mảng
    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    // Format thời gian
    function formatTime(sec) {
        let m = Math.floor(sec / 60).toString().padStart(2, '0');
        let s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    // Bắt đầu từ Màn hình cài đặt
    function startQuiz() {
        const isShuffle = document.getElementById('shuffle-cb').checked;
        isTimerActive = document.getElementById('timer-cb').checked;
        
        // Cài đặt câu hỏi
        questions = isShuffle ? shuffleArray(database) : [...database];
        currentQIndex = 0;

        // Cài đặt thời gian
        if (isTimerActive) {
            let minutes = parseInt(document.getElementById('time-input').value);
            if (isNaN(minutes) || minutes <= 0) minutes = 15; // Mặc định 15p nếu nhập sai
            totalSeconds = minutes * 60;
            document.getElementById('timer').innerText = formatTime(totalSeconds);
            startCountdown();
        } else {
            document.getElementById('timer').innerText = "Không giới hạn";
        }

        // Chuyển màn hình
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        loadQuestion();
    }

    function startCountdown() {
        timerInterval = setInterval(() => {
            totalSeconds--;
            document.getElementById('timer').innerText = formatTime(totalSeconds);
            
            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                endQuiz(true); // true = Hết giờ
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentQIndex >= questions.length) {
            endQuiz(false);
            return;
        }

        const qData = questions[currentQIndex];
        document.getElementById('progress').innerText = `Câu: ${currentQIndex + 1}/${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        qData.opts.forEach((optText, index) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = optText;
            btn.onclick = () => checkAnswer(btn, index, qData.ans);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedIndex, correctIndex) {
        const allOptions = document.querySelectorAll('.option');

        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add('correct');
            allOptions.forEach(btn => btn.classList.add('disabled'));

            setTimeout(() => {
                currentQIndex++;
                loadQuestion();
            }, 1000); // Đợi 1 giây rồi qua câu
        } else {
            selectedBtn.classList.add('wrong');
        }
    }

    function endQuiz(isTimeOut) {
        clearInterval(timerInterval);
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        
        const msgElement = document.getElementById('finish-message');
        if (isTimeOut) {
            msgElement.innerHTML = `<span style="color:#e74c3c; font-weight:bold;">Đã hết thời gian làm bài!</span><br>Bạn dừng lại ở câu ${currentQIndex}/${questions.length}`;
        } else {
            msgElement.innerHTML = `Bạn đã vượt qua toàn bộ ${questions.length} câu hỏi một cách xuất sắc!`;
        }
    }
</script>
